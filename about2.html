  .chart-wrap { width: 660px; max-width: 100%; }

  .info-tag { padding: 3px 10px; border: 1px solid #D4C5B8; border-radius: 12px; font-size: 11px; color: #9A8C7E; }

    desc:'為親子共同設計的瑜伽課程，透過有趣的動作與遊戲，讓大人和孩子一起在瑜伽墊上探索身體、建立連結。溫馨歡樂的氛圍，是親子共同成長的珍貴時光。',
    tags:['親子瑜伽','家庭','歡樂'], scores:[6.0,5.5,5.5,1.5] },

  { teacher:'顏顏', short:'哈達', course:'哈達瑜伽',

    tags:['Hatha Yoga','呼吸覺察','身心整合'], scores:[6.0,4.5,5.0,4.5] },
  { teacher:'顏顏', short:'修復', course:'正念修復瑜伽',
    desc:'搭配輔具以安穩練習，透過呼吸停留時間深層放鬆，緩解累積的緊繃壓力。藉由深入觀察增加對自身覺知，靜下心聚焦身體內在感受，在平靜中找到修復的力量。',
    tags:['Restorative','正念','深層放鬆'], scores:[9.0,2.0,5.5,1.5] },
  { teacher:'顏顏', short:'香氛伸展', course:'香氛瑜伽伸展',
    desc:'在香氛之中舒緩練習，以陽瑜伽為主，搭配調息讓身心更加放鬆。讓我們打開嗅覺感官，讓身體在香氛裡逐漸放鬆下來，透過與身體對話回到內在的平靜安定。',
    tags:['香氛','陽瑜伽','感官放鬆'], scores:[7.5,3.0,6.0,3.0] },

    desc:'搭配瑜伽輪，以溫柔的節奏帶領練習者在輔具的支持下慢慢開展身體。課程步調舒緩，練習者可依自己的狀態進退，是一堂輕鬆但有深度的均衡練習。',
    tags:['Yoga Wheel','溫柔型','均衡練習'], scores:[5.5,2.5,5.0,4.5] },
  { teacher:'顏顏', short:'哈達2', course:'哈達瑜伽（溫和）',
    desc:'以哈達為基礎，強調放鬆與覺察，而非強度。透過溫柔的節奏引導呼吸進入每個體位，幫助身體在安心的狀態下找到平衡，是身心同步放鬆的好選擇。',
    tags:['Hatha Yoga','溫柔型','身心放鬆'], scores:[5.5,2.5,5.0,4.5] },

// ─── AXES ─────────────────────────────────────
// scores index: [0]=流汗/伸展  [1]=溫柔/激勵嚴格  [2]=身體/心靈  [3]=初學/進階
const AXES = [
  { left:'想流汗',   right:'想伸展與穩定停留' },
  { left:'溫柔型',   right:'激勵嚴格型'        },
  { left:'身體導向', right:'心靈導向'           },
  { left:'適合初學', right:'適合進階挑戰'       },
];

// ─── STATE ────────────────────────────────────
let axisX = 0, axisY = 1, selected = null;

// ─── CHART DIMENSIONS ────────────────────────
const SVG_W = 660, SVG_H = 530;
const PAD = { left: 90, right: 32, top: 50, bottom: 72 };
const CW = SVG_W - PAD.left - PAD.right;
const CH = SVG_H - PAD.top  - PAD.bottom;
const CX0 = PAD.left,  CY0 = PAD.top;
const CX1 = CX0 + CW,  CY1 = CY0 + CH;
const MX  = CX0 + CW / 2;
const MY  = CY0 + CH / 2;
const R   = 20;

function scoreToPoint(sx, sy) {
  return { x: CX0 + (sx / 10) * CW, y: CY1 - (sy / 10) * CH };
}

// ─── COLLISION AVOIDANCE ──────────────────────
function avoidCollisions(pts, minDist, iters) {
  for (let k = 0; k < iters; k++) {
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[j].x - pts[i].x, dy = pts[j].y - pts[i].y;
        const d2 = dx*dx + dy*dy;
        if (d2 < minDist*minDist && d2 > 0.01) {
          const d = Math.sqrt(d2), push = (minDist - d) / 2 * 0.55;
          const nx = dx/d, ny = dy/d;
          pts[i].x -= nx*push; pts[i].y -= ny*push;
          pts[j].x += nx*push; pts[j].y += ny*push;
        }
      }
    }
    pts.forEach(p => {
      p.x = Math.max(CX0+R+2, Math.min(CX1-R-2, p.x));
      p.y = Math.max(CY0+R+2, Math.min(CY1-R-2, p.y));
    });
  }
}

// ─── SVG HELPERS ──────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}
function svgTxt(parent, x, y, str, size, fill, anchor, opts={}) {
  const e = document.createElementNS(NS, 'text');
  e.setAttribute('x', x); e.setAttribute('y', y);
  e.setAttribute('text-anchor', anchor||'middle');
  e.setAttribute('font-size', size);
  e.setAttribute('fill', fill);
  e.setAttribute('font-family', 'Georgia, serif');
  if (opts.weight)    e.setAttribute('font-weight', opts.weight);
  if (opts.transform) e.setAttribute('transform', opts.transform);
  e.textContent = str;
  parent.appendChild(e);
  return e;
}

// ─── AXIS PICKER ──────────────────────────────
function pickAxis(which, idx, btn) {
  if (which==='x' && idx===axisY) return;
  if (which==='y' && idx===axisX) return;
  if (which==='x') { axisX=idx; document.querySelectorAll('#x-row .axis-btn').forEach(b=>b.classList.remove('active')); }
  else             { axisY=idx; document.querySelectorAll('#y-row .axis-btn').forEach(b=>b.classList.remove('active')); }
  btn.classList.add('active');
  updateDisabled();
  render();
}
function updateDisabled() {
  document.querySelectorAll('#x-row .axis-btn').forEach(b=>{ b.disabled=(parseInt(b.dataset.idx)===axisY); });
  document.querySelectorAll('#y-row .axis-btn').forEach(b=>{ b.disabled=(parseInt(b.dataset.idx)===axisX); });
}

// ─── HIGHLIGHT HELPERS ────────────────────────
function dimOthers(teacher) {
  const svg = document.getElementById('chart-svg');
  svg.querySelectorAll('.teacher-dot').forEach(d => d.setAttribute('opacity', d.dataset.teacher===teacher?'1':'0.15'));
  svg.querySelectorAll('.conn-line').forEach(l  => l.setAttribute('opacity',  l.dataset.teacher===teacher?'0.55':'0.05'));
  document.querySelectorAll('.legend-item').forEach(it => it.classList.toggle('dimmed', it.dataset.teacher!==teacher));
}
function undim() {
  const svg = document.getElementById('chart-svg');
  svg.querySelectorAll('.teacher-dot').forEach(d => d.removeAttribute('opacity'));
  svg.querySelectorAll('.conn-line').forEach(l  => l.setAttribute('opacity','0.35'));
  document.querySelectorAll('.legend-item').forEach(it => it.classList.remove('dimmed'));
}

// ─── RENDER ───────────────────────────────────
function render() {
  const svg = document.getElementById('chart-svg');
  svg.innerHTML = '';

  // Defs
  const defs = el('defs',{},svg);
  const mk = el('marker',{id:'arr',markerWidth:'7',markerHeight:'7',refX:'3.5',refY:'3.5',orient:'auto'},defs);
  el('polygon',{points:'0,0 7,3.5 0,7',fill:'#C5BAB0'},mk);

  // Quadrant fills
  el('rect',{x:CX0, y:CY0, width:CW/2,height:CH/2,fill:'#FDFAF7'},svg);
  el('rect',{x:MX,  y:CY0, width:CW/2,height:CH/2,fill:'#F7FAFA'},svg);
  el('rect',{x:CX0, y:MY,  width:CW/2,height:CH/2,fill:'#FAF7FA'},svg);
  el('rect',{x:MX,  y:MY,  width:CW/2,height:CH/2,fill:'#F7FAFD'},svg);

  // Border + dashed centre lines
  el('rect',{x:CX0,y:CY0,width:CW,height:CH,fill:'none',stroke:'#D4C5B8','stroke-width':'1'},svg);
  el('line',{x1:MX,y1:CY0,x2:MX,y2:CY1,stroke:'#D4C5B8','stroke-width':'1','stroke-dasharray':'4 4'},svg);
  el('line',{x1:CX0,y1:MY,x2:CX1,y2:MY,stroke:'#D4C5B8','stroke-width':'1','stroke-dasharray':'4 4'},svg);

  // ── X axis (bottom strip) ──
  const axLY = SVG_H - 36;
  el('line',{x1:CX0,y1:axLY,x2:CX1-4,y2:axLY,stroke:'#C5BAB0','stroke-width':'0.8','marker-end':'url(#arr)'},svg);
  el('line',{x1:CX1,y1:axLY,x2:CX0+4,y2:axLY,stroke:'#C5BAB0','stroke-width':'0.8','marker-end':'url(#arr)'},svg);
  const ax = AXES[axisX];
  svgTxt(svg, CX0+4,  axLY+16, ax.left,  '11','#9A8C7E','start');
  svgTxt(svg, CX1-4,  axLY+16, ax.right, '11','#9A8C7E','end');

  // ── Y axis (left strip) ──
  // Axis line at x=18; labels at x=8 to avoid overlap
  const axLX = 18;
  const lblX = 8;
  el('line',{x1:axLX,y1:CY1,  x2:axLX,y2:CY0+4, stroke:'#C5BAB0','stroke-width':'0.8','marker-end':'url(#arr)'},svg);
  el('line',{x1:axLX,y1:CY0,  x2:axLX,y2:CY1-4, stroke:'#C5BAB0','stroke-width':'0.8','marker-end':'url(#arr)'},svg);
  const ay = AXES[axisY];
  // bottom label (low score = left side of axis)
  svgTxt(svg, lblX, CY1-18, ay.left,  '10','#9A8C7E','middle',{ transform:`rotate(-90,${lblX},${CY1-18})` });
  // top label (high score = right side of axis)
  svgTxt(svg, lblX, CY0+18, ay.right, '10','#9A8C7E','middle',{ transform:`rotate(-90,${lblX},${CY0+18})` });

  // ── Compute & collision-avoid positions ──
  const pts = courses.map(c => scoreToPoint(c.scores[axisX], c.scores[axisY]));
  avoidCollisions(pts, R*2.35, 40);

  // ── Connecting lines (same teacher) ──
  const groups = {};
  courses.forEach((c,i) => { if(!groups[c.teacher]) groups[c.teacher]=[]; groups[c.teacher].push(i); });
  Object.entries(groups).forEach(([teacher, idxs]) => {
    if (idxs.length < 2) return;
    const color = TEACHERS[teacher];
    for (let k = 0; k < idxs.length-1; k++) {
      const a=pts[idxs[k]], b=pts[idxs[k+1]];
      el('line',{x1:a.x,y1:a.y,x2:b.x,y2:b.y,
        stroke:color,'stroke-width':'1.2','stroke-dasharray':'4 3',
        opacity:'0.35',class:'conn-line','data-teacher':teacher},svg);
    }
  });

  // ── Dots ──
  courses.forEach((c,i) => {
    const {x,y} = pts[i];
    const color  = TEACHERS[c.teacher];
    const isSel  = selected===i;

    const g = el('g',{style:'cursor:pointer',class:'teacher-dot','data-teacher':c.teacher},svg);
    if (isSel) el('circle',{cx:x,cy:y,r:R+7,fill:'none',stroke:color,'stroke-width':'1.5',opacity:'0.4'},g);
    el('circle',{cx:x,cy:y,r:isSel?R+2:R,
      fill:isSel?color:color+'CC',stroke:color,'stroke-width':isSel?'1.5':'1'},g);
    svgTxt(g,x,y-2,  c.teacher,'8.5','#FFFFFF','middle',{weight:'500'});
    svgTxt(g,x,y+10, c.short,  '7.5','rgba(255,255,255,0.85)','middle');

    g.addEventListener('click', ()=>{ selected=i; showInfo(i); render(); });
    g.addEventListener('mouseenter', ()=> dimOthers(c.teacher));
    g.addEventListener('mouseleave', ()=> undim());
  });
}

// ─── INFO PANEL ───────────────────────────────
function showInfo(idx) {
  const c=courses[idx], color=TEACHERS[c.teacher];
  document.getElementById('info-panel').innerHTML = `
    <div class="info-content">
      <div class="info-top">
        <span class="info-teacher" style="color:${color}">${c.teacher}</span>
        <span class="info-dot">·</span>
        <span class="info-course">${c.course}</span>
      </div>
      <div class="info-desc">${c.desc}</div>
      <div class="info-tags">${c.tags.map(t=>`<span class="info-tag">${t}</span>`).join('')}</div>
    </div>`;
}

// ─── LEGEND ───────────────────────────────────
function buildLegend() {
  const lg = document.getElementById('legend');
  Object.entries(TEACHERS).forEach(([name,color]) => {
    const item = document.createElement('div');
    item.className='legend-item'; item.dataset.teacher=name;
    item.innerHTML=`<div class="legend-dot" style="background:${color}"></div>${name}`;
    item.addEventListener('mouseenter', ()=> dimOthers(name));
    item.addEventListener('mouseleave', ()=> undim());
    item.addEventListener('click', ()=>{
      const idx=courses.findIndex(c=>c.teacher===name);
      if(idx>=0){ selected=idx; showInfo(idx); render(); }
    });
    lg.appendChild(item);
  });
}

// ─── INIT ─────────────────────────────────────
updateDisabled();
buildLegend();
render();
</script>
